/* HUD */
.hud{padding:9px 12px 4px;display:flex;align-items:center;justify-content:space-between}
.cur{display:flex;align-items:center;gap:7px}
.cur svg{width:26px;height:26px;flex:none;filter:drop-shadow(0 2px 2px #0007)}
.cur .val{font-size:27px;font-weight:800;color:#ffd44d;text-shadow:0 2px 0 #0006;line-height:1}
.cur .nm{font-size:10px;color:#8fa3ba;letter-spacing:1px;text-transform:uppercase}
.hud .rgt{display:flex;flex-direction:column;align-items:flex-end;gap:3px}
.pill{border:0;border-radius:16px;padding:5px 10px;font-size:12px;font-weight:800;cursor:pointer;color:#20140a;
  background:linear-gradient(#ffe08a,#ffbf3d);box-shadow:0 3px 0 #b07d10}
.pill.on{background:linear-gradient(#8affc0,#37d98a);box-shadow:0 3px 0 #1c9e5e}
.inv{font-size:11px;font-weight:800;color:#ffcf6a}
.rate{padding:0 12px 4px;font-size:13px;color:#9fb3c8;text-align:center}
.rate b{color:#6fe0c4;font-weight:700}
/* title */
.titlebar{text-align:center;padding:2px 0 6px}
.titlebar h1{font-size:21px;font-weight:800;letter-spacing:2px;color:#ffd44d;text-shadow:0 2px 0 #7a5c00}
.titlebar small{display:block;font-size:10px;color:#8fa3ba;letter-spacing:3px}
/* tap */
.tapwrap{display:flex;justify-content:center;padding:0 12px 8px;position:relative}
.tapbtn{border:0;border-radius:16px;font-weight:800;color:#20140a;background:linear-gradient(#ffd76a,#f5b830);
  box-shadow:0 5px 0 #b07d10;cursor:pointer;letter-spacing:.5px;transition:padding .4s,font-size .4s}
.tapbtn.big{padding:14px 40px;font-size:18px}
.tapbtn.small{padding:7px 16px;font-size:13px;box-shadow:0 3px 0 #b07d10}
.tapbtn:active{transform:translateY(3px);box-shadow:0 1px 0 #b07d10}
.plus{position:absolute;font-size:16px;font-weight:800;color:#ffe98a;pointer-events:none;animation:up .8s ease-out forwards;text-shadow:0 1px 2px #000}
@keyframes up{0%{opacity:1;transform:translateY(0)}100%{opacity:0;transform:translateY(-46px)}}
/* buy-mode */
.modebar{display:flex;gap:6px;justify-content:center;padding:0 12px 6px}
.modebar button{flex:1;max-width:96px;border:0;border-radius:10px;padding:7px;font-weight:800;font-size:13px;cursor:pointer;
  background:#1c2634;color:#8fa3ba;border:1px solid #ffffff14}
.modebar button.sel{background:linear-gradient(#5fe6c3,#2fbf9c);color:#0d1a17}
/* main: shaft + list */
.main{flex:1;display:flex;min-height:0}
.shaft{width:46px;flex:none;position:relative;background:
  repeating-linear-gradient(#3a2c1c 0 8px,#2a2013 8px 16px);border-right:2px solid #00000055;overflow:hidden}
.shaft:before,.shaft:after{content:'';position:absolute;top:0;bottom:0;width:4px;background:#5a4326}
.shaft:before{left:8px}.shaft:after{right:8px}
.elev{position:absolute;left:3px;width:40px;transition:top .6s cubic-bezier(.5,.1,.3,1);z-index:2}
.elev .car{background:#1116;border:2px solid #ffcf6a;border-radius:7px;padding:2px}
.elev img{width:100%;display:block;filter:drop-shadow(0 2px 2px #000a)}
.list{flex:1;overflow-y:auto;padding:6px 8px 96px}
.gen{display:flex;align-items:center;gap:9px;margin:6px 2px;padding:9px;border-radius:12px;
  border:1px solid #ffffff12;position:relative;overflow:hidden}
.gen.locked{opacity:.55;filter:grayscale(.4) brightness(.8)}
.gen.reco{border-color:#6fe0c4;box-shadow:0 0 0 2px #6fe0c455,0 0 14px #2fbf9c66}
.gen .ic{width:42px;height:42px;flex:none;object-fit:contain;filter:drop-shadow(0 2px 2px #0008)}
.gen .mid{flex:1;min-width:0}
.gen .nm{font-weight:700;font-size:14px}
.gen .sub{font-size:11px;color:#a7bacf;margin-top:1px}
.gen .cnt{font-size:19px;font-weight:800;color:#7fe6cd;min-width:30px;text-align:center;flex:none}
.buy{flex:none;border:0;border-radius:10px;padding:8px 10px;font-weight:800;font-size:13px;cursor:pointer;
  color:#0d1a17;background:linear-gradient(#5fe6c3,#2fbf9c);box-shadow:0 3px 0 #1c8069;min-width:96px;text-align:center}
.buy:disabled{background:#2a3547;color:#728398;box-shadow:0 3px 0 #1a2230;cursor:default}
.buy:active:not(:disabled){transform:translateY(2px);box-shadow:0 1px 0 #1c8069}
.buy b{display:block;font-size:11px;font-weight:600;opacity:.9}
.dtag{position:absolute;top:4px;right:8px;font-size:9px;color:#ffffff2e;font-weight:800;letter-spacing:.5px}
/* footer */
.foot{position:absolute;left:0;right:0;bottom:0;padding:6px 12px 10px;background:linear-gradient(#0000,#0b1018f2 34%)}
.pbar{height:7px;border-radius:5px;background:#1c2634;overflow:hidden;margin:2px 2px 7px;border:1px solid #ffffff12}
.pbar i{display:block;height:100%;background:linear-gradient(90deg,#ffb15a,#f5852f);width:0;transition:width .3s}
.pbar-lbl{font-size:10px;color:#c99a6a;text-align:center;margin:-4px 0 6px;font-weight:700}
.frow{display:flex;gap:8px}
.frow button{flex:1;border:0;border-radius:12px;padding:11px;font-weight:800;font-size:14px;cursor:pointer}
.up{color:#0d1a17;background:linear-gradient(#7fe0d6,#38b7b0);box-shadow:0 4px 0 #1f7a76}
.up:disabled{background:#2a3547;color:#728398;box-shadow:0 3px 0 #1a2230}
.prestige{color:#3a1010;background:linear-gradient(#ffb36a,#f5852f);box-shadow:0 4px 0 #b0561a}
.prestige:disabled{background:#2a3547;color:#728398;box-shadow:0 3px 0 #1a2230}
.frow button:active:not(:disabled){transform:translateY(3px)}
/* modal / toast */
.modal{position:absolute;inset:0;background:#070a11e8;display:none;align-items:center;justify-content:center;z-index:30;padding:24px}
.modal.show{display:flex}
.card{background:linear-gradient(#1c2637,#141d2b);border:1px solid #ffffff1f;border-radius:18px;padding:22px;text-align:center;max-width:340px;width:100%}
.card h2{font-size:19px;margin-bottom:8px;color:#ffd44d}
.card p{color:#c3d0e0;font-size:14px;margin-bottom:14px;line-height:1.45}
.card .big{font-size:25px;font-weight:800;color:#7fe6cd;margin:6px 0 14px}
.card button{border:0;border-radius:12px;padding:11px 15px;font-weight:800;font-size:15px;cursor:pointer;margin:4px}
.card .ok{color:#0d1a17;background:linear-gradient(#5fe6c3,#2fbf9c);box-shadow:0 4px 0 #1c8069}
.card .ad{color:#20140a;background:linear-gradient(#ffe08a,#ffbf3d);box-shadow:0 4px 0 #b07d10}
.card .cancel{background:#2a3547;color:#c3d0e0}
.card .danger{color:#fff;background:linear-gradient(#ff7a6a,#e0432f);box-shadow:0 4px 0 #a02a1c}
.toast{position:absolute;left:50%;top:64px;transform:translateX(-50%);background:#0e1622ee;border:1px solid #ffffff22;
  padding:9px 16px;border-radius:20px;font-size:13px;font-weight:700;z-index:25;opacity:0;transition:opacity .3s;pointer-events:none;color:#ffd44d;text-align:center;max-width:88%}
.toast.show{opacity:1}
.settings{position:absolute;top:44px;right:10px;background:#151f2e;border:1px solid #ffffff1f;border-radius:12px;padding:8px;z-index:26;display:none}
.settings.show{display:block}
.settings button{display:block;width:150px;margin:4px 0;border:0;border-radius:9px;padding:9px;font-weight:700;cursor:pointer;background:#22304a;color:#eef3fa}
/* descent flash */
#app.descend .list{animation:desc .7s ease-in}
@keyframes desc{0%{transform:translateY(0);opacity:1}45%{transform:translateY(30px);opacity:.2}55%{transform:translateY(-40px);opacity:0}100%{transform:translateY(0);opacity:1}}

<script>
// Big number (mantissa+exponent) — точность за пределом 1e15 (BLOCKER-4 диздока).
// Инвариант: m===0 (ноль) либо 1<=|m|<10. e — целое.
function norm(b){ let {m,e}=b; if(m===0||!isFinite(m))return {m:0,e:0};
  while(Math.abs(m)>=10){m/=10;e++;} while(Math.abs(m)<1){m*=10;e--;} return {m,e}; }
const fromNum=(n)=> n===0?{m:0,e:0}:norm({m:n,e:0});
const isZero=(a)=> a.m===0;
function cmp(a,b){ // -1,0,1
  if(a.m===0&&b.m===0)return 0; if(a.m===0)return b.m>0?-1:1; if(b.m===0)return a.m>0?1:-1;
  if(a.e!==b.e)return a.e>b.e?1:-1; return a.m>b.m?1:(a.m<b.m?-1:0); }
const gte=(a,b)=> cmp(a,b)>=0;
function add(a,b){ if(a.m===0)return b; if(b.m===0)return a;
  const hi=a.e>=b.e?a:b, lo=a.e>=b.e?b:a, d=hi.e-lo.e; if(d>16)return hi;
  return norm({m:hi.m + lo.m/Math.pow(10,d), e:hi.e}); }
function sub(a,b){ return add(a,{m:-b.m,e:b.e}); }
function mulN(a,k){ if(k===0||a.m===0)return {m:0,e:0}; return norm({m:a.m*k,e:a.e}); }
function mul(a,b){ if(a.m===0||b.m===0)return {m:0,e:0}; return norm({m:a.m*b.m,e:a.e+b.e}); }
// base^exp через 10^(exp*log10(base)) — без переполнения
function powNum(base,exp){ if(base<=0)return {m:0,e:0}; const L=exp*Math.log10(base);
  const e=Math.floor(L); return norm({m:Math.pow(10,L-e),e}); }
const toNum=(a)=> a.m===0?0:a.m*Math.pow(10,a.e);
const SUF=['','k','M','B','T','aa','ab','ac','ad','ae','af','ag','ah','ai','aj','ak'];
function fmt(a){ if(a.m===0)return '0'; if(a.e<3)return (a.m*Math.pow(10,a.e)).toFixed(a.e<1?1:0);
  const grp=Math.floor(a.e/3), rem=a.e-grp*3, val=a.m*Math.pow(10,rem);
  const suf=grp<SUF.length?SUF[grp]:('e'+a.e); return val.toFixed(2)+suf; }
// round-trip сериализация (кастомный, не голый JSON) — MAJOR-4
const ser=(a)=> a.m===0?'0':(a.m+'|'+a.e);
function deser(s){ if(s==='0'||!s)return {m:0,e:0}; const [m,e]=s.split('|').map(Number);
  if(!isFinite(m)||!Number.isInteger(e))return {m:0,e:0}; return norm({m,e}); }
const B={norm,fromNum,isZero,cmp,gte,add,sub,mulN,mul,powNum,toNum,fmt,ser,deser};
function newState(cfg){ return {coins:{m:0,e:0}, runEarned:{m:0,e:0},
  gens:cfg.generators.map(()=>({units:0})), globalUp:0, P:0, boostUntil:0, lastSeen:0}; }
function milestoneCount(cfg,units){ let c=0; for(const m of cfg.milestones) if(units>=m)c++; return c; }
const milestoneMult=(cfg,units)=> Math.pow(cfg.milestoneMult, milestoneCount(cfg,units));
function globalMult(s,cfg){ let m=1; for(let i=0;i<s.globalUp;i++) m*=cfg.globalUpgrades[i].mult;
  return m*(1+cfg.prestigePerPointMult*s.P); }
const boostMult=(s,cfg,now)=> now<s.boostUntil?cfg.rewardBoostMult:1;
function genCost(cfg,i,units){ const g=cfg.generators[i];
  return B.mul(B.powNum(g.growth,units), B.fromNum(g.baseCost)); }
function production(s,cfg,now){ let p={m:0,e:0}; const gm=globalMult(s,cfg)*boostMult(s,cfg,now);
  for(let i=0;i<s.gens.length;i++){ const u=s.gens[i].units; if(!u)continue;
    const per=cfg.generators[i].baseProd*milestoneMult(cfg,u)*gm;
    p=B.add(p, B.mulN(B.fromNum(u), per)); } return p; }
function upgradeCost(s,cfg){ return s.globalUp<cfg.globalUpgrades.length?B.fromNum(cfg.globalUpgrades[s.globalUp].cost):null; }
function buyGen(s,cfg,i){ const c=genCost(cfg,i,s.gens[i].units);
  if(B.gte(s.coins,c)){ s.coins=B.sub(s.coins,c); s.gens[i].units++; return true;} return false; }
function buyUpgrade(s,cfg){ const c=upgradeCost(s,cfg); if(c&&B.gte(s.coins,c)){ s.coins=B.sub(s.coins,c); s.globalUp++; return true;} return false; }
function tick(s,cfg,dt,now){ const g=B.mulN(production(s,cfg,now),dt); s.coins=B.add(s.coins,g); s.runEarned=B.add(s.runEarned,g); }
function bnSqrt(a){ if(a.m<=0)return {m:0,e:0}; let m=a.m,e=a.e; if(e%2!==0){m*=10;e--;} return B.norm({m:Math.sqrt(m),e:e/2}); }
function prestigeGain(s,cfg){ const r=B.mul(s.runEarned,B.fromNum(1/cfg.prestigeC));

  back:'Welcome back!',backTxt:'While away, the mine dug up:',take:'Collect',dbl:'📺 Double',boost:'📺 x2',boostOn:'⏩ x2',locked:'locked',
  depthTo:'To next investor',ready:'Ready to sell the mine!',presAsk:'Sell the mine to investors?',
  presTxt:'Progress resets, but you gain +{n} investors forever (×{m} output) and descend into a rich new deposit.',
  sold:'Mine sold! +{n} investors · Deposit #{d}',daily:'🔥 Daily bonus!',sndOn:'🔊 Sound: on',sndOff:'🔇 Sound: off'};

// strata color per tier
function strata(i){const t=i/9;const a=[36,50,72],b=[62,42,26];
  const c1=a.map((v,k)=>Math.round(v+(b[k]-v)*t)),c2=c1.map(v=>Math.max(0,v-14));
  return `linear-gradient(rgb(${c1}),rgb(${c2}))`;}

const KEY='minetycoon_v2';
let S=E.newState(MINING),gameT=0,deposit=1,dailyDay=-1,buyMode='1',muted=false,pendingOffline=null,lastBoost=-1e9;
let cheerT=0;

// ---- audio ----
let ac=null;function blip(f,d=0.08,type='square'){ if(muted)return; try{ac=ac||new (window.AudioContext||window.webkitAudioContext)();
  const o=ac.createOscillator(),g=ac.createGain();o.type=type;o.frequency.value=f;g.gain.value=0.05;
  o.connect(g);g.connect(ac.destination);o.start();g.gain.exponentialRampToValueAtTime(0.0001,ac.currentTime+d);o.stop(ac.currentTime+d);}catch(e){}}

// ---- save/load ----
function save(){try{localStorage.setItem(KEY,JSON.stringify({v:2,coins:B.ser(S.coins),run:B.ser(S.runEarned),
  gens:S.gens.map(g=>g.units),gu:S.globalUp,P:S.P,boost:S.boostUntil,gt:gameT,dep:deposit,day:dailyDay,mute:muted,t:Date.now()}));}catch(e){}}
function load(){let raw;try{raw=localStorage.getItem(KEY);}catch(e){return;}if(!raw)return;
  try{const o=JSON.parse(raw);if(!o||o.v!==2)return;S.coins=B.deser(o.coins);S.runEarned=B.deser(o.run);
    (o.gens||[]).forEach((u,i)=>{if(S.gens[i]&&Number.isInteger(u))S.gens[i].units=u;});
    if(Number.isInteger(o.gu))S.globalUp=o.gu;if(typeof o.P==='number')S.P=o.P;
    gameT=+o.gt||0;S.boostUntil=+o.boost||0;deposit=Number.isInteger(o.dep)?o.dep:1;
    dailyDay=Number.isInteger(o.day)?o.day:-1;muted=!!o.mute;return +o.t||null;}catch(e){return;}}
function dayIndex(){const d=new Date();return Math.floor(Date.UTC(d.getFullYear(),d.getMonth(),d.getDate())/864e5);}

// ---- build DOM ----
const listEl=document.getElementById('list'),rows=[];
MINING.generators.forEach((g,i)=>{const el=document.createElement('div');el.className='gen locked';el.style.background=strata(i);
  el.innerHTML=`<div class="dtag">-${(i+1)*50}м</div><img class="ic" src="${ICONS[i]}" alt=""><div class="mid"><div class="nm">${RU?g.name:NAMES_EN[i]}</div><div class="sub"></div></div><div class="cnt">0</div><button class="buy"></button>`;
  el.querySelector('.buy').onclick=()=>doBuy(i);listEl.appendChild(el);rows.push(el);});
document.getElementById('curNm').textContent=T.cur;
document.getElementById('tapBtn').textContent=T.tap;
document.getElementById('boostBtn').textContent=T.boost;

// ---- actions ----
function doBuy(i){let n=buyMode==='1'?1:buyMode==='10'?10:9999,k=0;
  while(k<n&&E.buyGen(S,MINING,i)){k++;}
  if(k){blip(180+i*20);if(S.gens[i].units%25<k)cheer();render();save();}}
document.getElementById('tapBtn').onclick=(e)=>{S.coins=B.add(S.coins,B.fromNum(MINING.tapGain0));S.runEarned=B.add(S.runEarned,B.fromNum(MINING.tapGain0));
  blip(520,0.05);floatPlus(e.currentTarget,'+'+B.fmt(B.fromNum(MINING.tapGain0)));};
document.getElementById('upBtn').onclick=()=>{if(E.buyUpgrade(S,MINING)){blip(700);cheer();render();save();}};
document.getElementById('modebar').onclick=(e)=>{const b=e.target.closest('button');if(!b)return;buyMode=b.dataset.m;
  [...document.getElementById('modebar').children].forEach(x=>x.classList.toggle('sel',x===b));render();};
// prestige w/ confirm
document.getElementById('presBtn').onclick=()=>{const g=E.prestigeGain(S,MINING);if(g<1)return;
  const gm=(1+MINING.prestigePerPointMult*(S.P+g)).toFixed(2);
  document.getElementById('presText').textContent=T.presTxt.replace('{n}',g).replace('{m}',gm);
  document.getElementById('presModal').classList.add('show');};
document.getElementById('presNo').onclick=()=>document.getElementById('presModal').classList.remove('show');
document.getElementById('presYes').onclick=()=>{const g=E.prestigeGain(S,MINING);if(g<1)return;
  E.doPrestige(S,MINING);deposit++;document.getElementById('presModal').classList.remove('show');
  const app=document.getElementById('app');app.classList.add('descend');setTimeout(()=>app.classList.remove('descend'),750);
  blip(160,0.2,'sawtooth');setTimeout(()=>blip(240,0.2),120);setTimeout(()=>blip(360,0.25),240);
  toast(T.sold.replace('{n}',g).replace('{d}',deposit));render();save();};
// boost
document.getElementById('boostBtn').onclick=()=>{if(gameT<S.boostUntil)return;if(gameT-lastBoost<MINING.rewardBoostCooldownSec&&lastBoost>-1e8)return;
  const b=document.getElementById('boostBtn');b.textContent='...';setTimeout(()=>{S.boostUntil=gameT+MINING.rewardBoostSec;lastBoost=gameT;blip(660);render();},500);};
// offline
document.getElementById('offOk').onclick=()=>{document.getElementById('offlineModal').classList.remove('show');pendingOffline=null;save();};
document.getElementById('offX2').onclick=()=>{if(pendingOffline){S.coins=B.add(S.coins,pendingOffline);S.runEarned=B.add(S.runEarned,pendingOffline);pendingOffline=null;}
  document.getElementById('offlineModal').classList.remove('show');blip(700);cheer();save();};
// settings / mute / reset
const setEl=document.getElementById('settings');
document.getElementById('setBtn').onclick=()=>setEl.classList.toggle('show');
const muteBtn=document.getElementById('muteBtn');
function updMute(){muteBtn.textContent=muted?T.sndOff:T.sndOn;}
muteBtn.onclick=()=>{muted=!muted;updMute();save();};
document.getElementById('resetBtn').onclick=()=>{setEl.classList.remove('show');document.getElementById('resetModal').classList.add('show');};
document.getElementById('resetNo').onclick=()=>document.getElementById('resetModal').classList.remove('show');
document.getElementById('resetYes').onclick=()=>{try{localStorage.removeItem(KEY);}catch(e){}location.reload();};

// ---- fx ----
const heroImg=document.querySelector('.elev img');
function cheer(){heroImg.style.transform='scale(1.14) rotate(-5deg)';cheerT=gameT+0.35;}
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),2200);}
function floatPlus(anchor,txt){const r=anchor.getBoundingClientRect(),p=document.createElement('div');p.className='plus';p.textContent=txt;
  p.style.left=(r.left+r.width/2-14)+'px';p.style.top=(r.top-6)+'px';document.body.appendChild(p);setTimeout(()=>p.remove(),820);}

// ---- recommend next purchase ----
function recoIndex(){ // ближайшая разблокировка, иначе лучший ROI доступный
  let unlock=-1;for(let i=0;i<S.gens.length;i++)if(S.gens[i].units===0&&B.gte(S.coins,E.genCost(MINING,i,0))){unlock=i;break;}
  if(unlock>=0)return unlock;let bi=-1,br=-1;
  for(let i=0;i<S.gens.length;i++){const u=S.gens[i].units;if(u===0)continue;const cost=E.genCost(MINING,i,u);
    if(B.gte(S.coins,cost)){const mp=MINING.generators[i].baseProd*E.milestoneMult(MINING,u+1);const r=mp/B.toNum(cost);if(r>br){br=r;bi=i;}}}
  return bi;}

// ---- render (diffed: мутируем DOM только при изменении → не глотаем тапы по кнопкам) ----
function setHTML(el,v){ if(el.__h!==v){el.__h=v;el.innerHTML=v;} }
function setTxt(el,v){ if(el.__t!==v){el.__t=v;el.textContent=v;} }
function setDis(el,v){ if(el.disabled!==v) el.disabled=v; }
function setSt(el,k,v){ if(el.style[k]!==v) el.style[k]=v; }
function render(){
  setTxt(document.getElementById('coins'),B.fmt(S.coins));
  const prod=E.production(S,MINING,gameT),boost=gameT<S.boostUntil;
  setHTML(document.getElementById('rate'),`<b>${B.fmt(prod)}</b> ${T.per}${boost?' ⏩x2':''}`);
  const gm=E.globalMult(S,MINING);
  setTxt(document.getElementById('invLbl'),S.P>0?`💼 ${S.P} ${T.inv} · ×${gm.toFixed(2)}`:'');
  setTxt(document.getElementById('tag'),T.tag+deposit);
  const bb=document.getElementById('boostBtn');bb.classList.toggle('on',boost);setTxt(bb,boost?T.boostOn:T.boost);
  const tb=document.getElementById('tapBtn');const small=B.toNum(prod)>MINING.tapGain0*8;tb.classList.toggle('small',small);tb.classList.toggle('big',!small);
  let deepest=-1;S.gens.forEach((g,i)=>{if(g.units>0)deepest=i;});
  setSt(document.getElementById('elev'),'top',(deepest<0?2:((deepest+0.5)/MINING.generators.length)*100)+'%');
  const reco=recoIndex();
  MINING.generators.forEach((g,i)=>{const el=rows[i],u=S.gens[i].units,cost=E.genCost(MINING,i,u),aff=B.gte(S.coins,cost),unlocked=u>0;
    el.classList.toggle('locked',!unlocked&&!aff);el.classList.toggle('reco',i===reco);
    setTxt(el.querySelector('.cnt'),String(u));
    const per=g.baseProd*E.milestoneMult(MINING,u)*gm*(boost?MINING.rewardBoostMult:1);
    setTxt(el.querySelector('.sub'),unlocked?(B.fmt(B.mulN(B.fromNum(u),per))+' '+T.per):T.locked);
    const btn=el.querySelector('.buy');setDis(btn,!aff);
    const lbl=unlocked?T.buy:T.unlock;const suff=(unlocked&&buyMode!=='1')?(' '+(buyMode==='M'?'Max':'x'+buyMode)):'';
    setHTML(btn,`${lbl}${suff}<b>${B.fmt(cost)}</b>`);});
  const uc=E.upgradeCost(S,MINING),ub=document.getElementById('upBtn');
  if(uc){setSt(ub,'display','');setDis(ub,!B.gte(S.coins,uc));setHTML(ub,`${T.up} <b style="font-weight:600;font-size:11px">${B.fmt(uc)}</b>`);}else setSt(ub,'display','none');
  const pg=E.prestigeGain(S,MINING),unlockLt=MINING.prestigeUnlockLifetime;
  const canPres=B.gte(S.runEarned,B.fromNum(unlockLt))&&pg>=1;
  const pb=document.getElementById('presBtn');setDis(pb,!canPres);setHTML(pb,canPres?`${T.pres} <b style="font-weight:600">+${pg}</b>`:T.pres);
  const frac=Math.min(1,Math.log10(Math.max(1,B.toNum(S.runEarned)+1))/Math.log10(unlockLt));
  setSt(document.getElementById('pbar'),'width',(canPres?100:frac*100)+'%');
  setTxt(document.getElementById('pbarLbl'),canPres?T.ready:`${T.depthTo}: ${Math.floor(frac*100)}%`);
}

// ---- loop ----
let acc=0,lastFrame=performance.now()/1000,uiAcc=0;
function frame(){const t=performance.now()/1000;let dt=t-lastFrame;lastFrame=t;if(dt>0){if(dt>1)dt=1;gameT+=dt;E.tick(S,MINING,dt,gameT);}
  if(cheerT&&gameT>cheerT){heroImg.style.transform='';cheerT=0;}
  uiAcc+=dt;if(uiAcc>=0.08){uiAcc=0;render();}
  acc+=dt;if(acc>=5){acc=0;save();}requestAnimationFrame(frame);}

// ---- daily / offline ----
function checkDaily(){const d=dayIndex();if(dailyDay===d)return;if(dailyDay!==-1){const prod=E.production(S,MINING,gameT);
  const bonus=B.isZero(prod)?B.fromNum(50):B.mulN(prod,3600);S.coins=B.add(S.coins,bonus);S.runEarned=B.add(S.runEarned,bonus);toast(T.daily);cheer();}dailyDay=d;}
function handleOffline(ms){if(!ms)return;const dt=(Date.now()-ms)/1000;if(dt<MINING.minAccrualIntervalSec)return;
  const g=E.applyOffline(S,MINING,dt,gameT,false);if(B.isZero(g))return;pendingOffline=g;
  document.getElementById('offAmt').textContent=B.fmt(g);document.getElementById('offTitle').textContent=T.back;document.getElementById('offText').textContent=T.backTxt;
  document.getElementById('offOk').textContent=T.take;document.getElementById('offX2').textContent=T.dbl;document.getElementById('offlineModal').classList.add('show');}

// ---- boot ----
const savedMs=load();updMute();checkDaily();handleOffline(savedMs);render();requestAnimationFrame(frame);
document.addEventListener('visibilitychange',()=>{if(document.hidden)save();});window.addEventListener('pagehide',save);
</script></body></html>
